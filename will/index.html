<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <title>Will</title>
    <style>
        :root { --accent: #ffffff; --bg: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--accent); 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; height: 100vh;
        }
        .header { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-top: 40px; }
        
        .main-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
        .energy-label { font-size: 12px; text-transform: uppercase; margin-bottom: 10px; opacity: 0.8; }
        .energy-value { font-size: 120px; font-weight: 200; line-height: 1; letter-spacing: -5px; }
        
        .status-bar { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; margin-bottom: 40px; }
        .status-text { font-size: 14px; font-weight: 400; }

        #tg-login-container { display: flex; justify-content: flex-start; min-height: 40px; }
        
        /* Убираем все лишнее свечение */
        #energy-fill { display: none; } 
    </style>
</head>
<body>

    <div class="header">Thelema / Observer Mode</div>

    <div class="main-display">
        <div class="energy-label">Current Energy</div>
        <div class="energy-value"><span id="energy-val">0</span>%</div>
    </div>
    
    <div class="status-bar">
        <div class="status-text" id="status-text">Identification required</div>
    </div>

    <div id="tg-login-container">
        <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="Thelema_Orbit_Bot" 
                data-size="large" 
                data-onauth="onTelegramAuth(user)" 
                data-request-access="write"></script>
    </div>

    <script>
        function onTelegramAuth(user) {
            document.getElementById('tg-login-container').style.opacity = '0';
            setTimeout(() => document.getElementById('tg-login-container').style.display = 'none', 300);
            document.getElementById('status-text').innerText = "Subject: " + user.first_name;
            
            // "Умный" расчет энергии
            let hour = new Date().getHours();
            let energy = 50; 
            if (hour >= 6 && hour <= 9) energy = 85; // Бонус за утро
            
            animateValue("energy-val", 0, energy, 1500);
        }

        function animateValue(id, start, end, duration) {
            let obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) { window.requestAnimationFrame(step); }
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
