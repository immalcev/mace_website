<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Will Project">
    <meta name="theme-color" content="#F8F6F0">
    
    <title>Will Project | Mayhem Design</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-section" class="container">
        <div class="header">MAYHEM<br>IDENTITY</div>
        <button class="btn-action" onclick="registerUser()">Войти или зарегистрироваться</button>
    </div>

    <div id="main-content" class="container" style="display: none;">
        <div class="header">MAYHEM<br>CONTROL</div>

        <div class="energy-widget">
            <div class="status-label">Уровень Энергии (Apple Watch)</div>
            <div id="energy-display" class="energy-value">0%</div>
            <div id="status-text" class="status-label">Статус: Ожидание данных</div>
        </div>
        
        <div class="observer-info status-label">Наблюдатель: <span id="user-display"></span></div>
    </div>

    <div id="install-modal" style="display: none;">
        <div class="modal-content">
            <strong>УСТАНОВКА АРТЕФАКТА</strong>
            <p>Чтобы закрепить свою Волю на экране: нажми «Поделиться» в Safari и выбери «На экран Домой».</p>
            <button onclick="closeModal()">ПОНЯТНО</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
