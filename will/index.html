<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Thelema One</title>
    <style>
        body { background: #000; color: #3b82f6; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; justify-content: center; overflow: hidden; }
        .energy-orbit { position: relative; width: 250px; height: 250px; border: 2px solid #1e3a8a; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px #1e3a8a; }
        #energy-fill { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 4px solid #3b82f6; clip-path: inset(50% 0 0 0); transition: 1s cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 0 10px #3b82f6); }
        .percent { font-size: 3rem; font-weight: bold; z-index: 10; color: #fff; text-shadow: 0 0 10px #3b82f6; }
        .status { margin-top: 20px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
        #tg-login-container { margin-top: 30px; }
        .quote { position: absolute; bottom: 40px; font-style: italic; font-size: 0.7rem; opacity: 0.6; padding: 0 20px; }
    </style>
</head>
<body>

    <div class="energy-orbit">
        <div id="energy-fill"></div>
        <div class="percent"><span id="energy-val">0</span>%</div>
    </div>
    
    <div class="status" id="status-text">Наблюдатель не авторизован</div>

    <div id="tg-login-container">
        <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="thelemaonebot" 
                data-size="large" 
                data-onauth="onTelegramAuth(user)" 
                data-request-access="write"></script>
    </div>

    <div class="quote">"Every man and every woman is a star" [cite: 485]</div>

    <script>
        function onTelegramAuth(user) {
            document.getElementById('tg-login-container').style.display = 'none';
            document.getElementById('status-text').innerText = "Воля " + user.first_name + " в центре";
            calculateSmartEnergy(user);
        }

        function calculateSmartEnergy(user) {
            // "Умная" логика: привязка к твоему режиму
            let baseEnergy = 50; 
            let hour = new Date().getHours();
            
            // Бонус за ранний подъем (6:00 - 8:00) [cite: 268, 269]
            if (hour >= 6 && hour <= 8) baseEnergy += 20; 
            
            updateUI(baseEnergy);
        }

        function updateUI(val) {
            document.getElementById('energy-val').innerText = val;
            document.getElementById('energy-fill').style.clipPath = `inset(${100 - val}% 0 0 0)`;
        }
    </script>
</body>
</html>
