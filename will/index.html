<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will | Mayhem Energy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mayhem-container">
        <h1 class="glitch" data-text="ENERGY_LEVEL">ENERGY_LEVEL</h1>
        
        <div class="energy-widget">
            <div class="energy-bar">
                <div id="energy-fill" class="fill"></div>
            </div>
            <div class="stats">
                <span id="step-count">0</span> / 10000 STEPS
            </div>
        </div>

        <div class="status-box">
            <p id="status-text">SYSTEM_READY</p>
            <p class="sub-text">SYNCED_VIA_APPLE_WATCH</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
