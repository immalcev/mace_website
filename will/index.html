<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Will</title>
    <style>
        :root { --accent: #ffffff; --bg: #000000; }
        body { 
            background: var(--bg); color: var(--accent); 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            text-align: center;
        }
        .header { 
            position: absolute; top: 60px;
            font-size: 10px; text-transform: uppercase; 
            letter-spacing: 3px; opacity: 0.4; 
        }
        
        .main-display { margin-bottom: 40px; }
        .energy-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; opacity: 0.6; }
        .energy-value { font-size: clamp(80px, 20vw, 140px); font-weight: 200; line-height: 1; letter-spacing: -6px; }
        
        .status-bar { 
            position: absolute; bottom: 120px;
            width: 80%; border-top: 1px solid rgba(255,255,255,0.1); 
            padding-top: 20px; 
        }
        .status-text { font-size: 13px; opacity: 0.8; margin-bottom: 20px; }

        #tg-login-container { 
            position: absolute; bottom: 60px;
            display: flex; justify-content: center; width: 100%;
        }
    </style>
</head>
<body>

    <div class="header">Thelema / Observer Mode</div>

    <div class="main-display">
        <div class="energy-label">Current Energy</div>
        <div class="energy-value"><span id="energy-val">0</span>%</div>
    </div>
    
    <div class="status-bar">
        <div class="status-text" id="status-text">Identification required</div>
    </div>

    <div id="tg-login-container">
        <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="ThelemaOneBot" 
                data-size="large" 
                data-onauth="onTelegramAuth(user)" 
                data-request-access="write"></script>
    </div>

    <script>
        function onTelegramAuth(user) {
            document.getElementById('tg-login-container').style.display = 'none';
            document.getElementById('status-text').innerText = "Observer: " + user.first_name;
            
            let hour = new Date().getHours();
            let energy = 50; 
            if (hour >= 6 && hour <= 9) energy = 85; 
            
            animateValue("energy-val", 0, energy, 2000);
        }

        function animateValue(id, start, end, duration) {
            let obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) { window.requestAnimationFrame(step); }
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
