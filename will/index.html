<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Will Project">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#F8F6F0">
    
    <title>Will Project | Mayhem Design</title>
    
    <style>
        :root {
            --bg-color: #F8F6F0; /* Твой скорректированный параметр фона */
            --accent-color: #000000;
            --text-main: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            margin-top: 50px;
        }

        .header {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 0.9;
            margin-bottom: 40px;
            border-left: 8px solid var(--accent-color);
            padding-left: 15px;
        }

        .energy-widget {
            background: #fff;
            padding: 20px;
            border: 2px solid var(--accent-color);
            box-shadow: 10px 10px 0px var(--accent-color);
            margin-bottom: 30px;
        }

        .energy-value {
            font-size: 3rem;
            font-weight: 800;
            margin: 10px 0;
        }

        .status-label {
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: bold;
            color: #666;
        }

        .btn-register {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s;
        }

        .btn-register:active {
            transform: scale(0.98);
        }

        /* Инструкция для установки */
        .install-hint {
            margin-top: auto;
            font-size: 0.75rem;
            text-align: center;
            color: #888;
            padding: 20px;
        }
        #install-modal {
    background: #F8F6F0;
    border: 2px solid #000;
    padding: 20px;
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    z-index: 1000;
    box-shadow: 10px 10px 0px #000; /* Тот самый дерзкий стиль */
    font-family: 'Geometria', sans-serif; /* Или твой шрифт */
}

#install-modal button {
    background: #000;
    color: #F8F6F0;
    border: none;
    padding: 10px 20px;
    margin-top: 10px;
    text-transform: uppercase;
    font-weight: bold;
    cursor: pointer;
}
    </style>
</head>
<body>

    <div class="container">
        <div class="header">MAYHEM<br>CONTROL</div>

        <div class="energy-widget">
            <div class="status-label">Уровень Энергии (Apple Watch)</div>
            <div id="energy-display" class="energy-value">0%</div>
            <div class="status-label">Статус: Ожидание данных</div>
        </div>

        <button class="btn-register" onclick="registerUser()">Зарегистрироваться в системе</button>
    </div>

    <div class="install-hint">
        Чтобы использовать как приложение:<br>
        Нажми <strong>«Поделиться»</strong> в Safari → <strong>«На экран „Домой“»</strong>
    </div>

    <script>
        // Функция регистрации (базовая логика)
        function registerUser() {
            const userName = prompt("Введи свой ID или имя для регистрации:");
            if (userName) {
                localStorage.setItem('user_id', userName);
                alert("Регистрация завершена. Твой ID: " + userName);
                updateDisplay();
            }
        }

        function showInstallPrompt() {
    // Проверяем, не запущено ли уже как PWA
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
    if (!isStandalone) {
        // Показываем твой кастомный модал
        document.getElementById('install-modal').style.display = 'block';
    }
}

        // Обновление данных из URL (для интеграции с Командами iOS)
        function updateDisplay() {
            const params = new URLSearchParams(window.location.search);
            const steps = params.get('steps');
            if (steps) {
                const energy = Math.min(Math.round(steps / 100), 100);
                document.getElementById('energy-display').innerText = energy + '%';
            }
        }

        window.onload = updateDisplay;
    </script>
</body>
</html>
