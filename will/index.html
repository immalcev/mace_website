<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default"> <meta name="apple-mobile-web-app-title" content="Mayhem Control">
    <meta name="theme-color" content="#F8F6F0">

    <title>Mayhem Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="hidden">
        <div class="header">Authentication Required</div>
        <div id="tg-widget-container"></div>
    </div>

    <div id="main-screen" class="hidden">
        <div class="logout-btn" onclick="logout()">Logout / Switch Account</div>
        <div class="header">Thelema / Observer Mode</div>

        <div class="energy-container">
            <div class="rings-btn" onclick="toggleModal('device-modal')">
                <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5">
                    <circle cx="12" cy="12" r="9" opacity="0.2"/>
                    <circle cx="12" cy="12" r="6" opacity="0.4"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </div>
            <div class="energy-label">Current Energy</div>
            <div class="energy-value"><span id="energy-val">0</span>%</div>
        </div>

        <div class="tasks-container" id="tasks-list">
            </div>

        <div class="input-area">
            <input type="text" id="task-input" placeholder="Расскажи Gemini, что сделано...">
            <button class="voice-btn" id="voice-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 18v5M8 23h8"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="device-modal" class="modal">
        <div class="modal-content">
            <div class="energy-label" style="margin-bottom: 20px;">Mayhem Control / Devices</div>
            <p>Синхронизируйте кольца активности для автоматического восполнения Воли.</p>
            <button class="btn-black" onclick="connectDevice()">Добавить кольца</button>
            <button class="btn-secondary" onclick="toggleModal('device-modal')">Закрыть</button>
        </div>
    </div>

    <div id="pwa-modal" class="modal">
        <div class="modal-content">
            <div class="energy-label" style="margin-bottom: 20px;">System Notification</div>
            <p>Добавьте терминал на экран 'Домой' для доступа к биометрии и уведомлениям.</p>
            <button class="btn-black" onclick="toggleModal('pwa-modal')">Понял</button>
        </div>
    </div>

    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
